<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pee on the Hole Game</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background-image: url("https://github.com/Harish040805/harishcreationswebgames/blob/main/peeontheholegame.jpg?raw=true");
            background-repeat: no-repeat; background-position: center; background-size: cover; }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        .top-left-controls { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 15px; z-index: 20; }
        .welcome-text { color: white; font-weight: bold; font-size: 1.2rem; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
        .nav-btn { 
            padding: 8px 15px; font-size: 16px; background: rgba(255, 255, 255, 0.9); 
            color: #333; border: none; border-radius: 5px; cursor: pointer; 
            font-weight: bold; transition: background 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .nav-btn:hover { background: #fff; transform: scale(1.05); }

        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); z-index: 10; transition: opacity 0.5s ease; }
        h1 { color: white; font-size: 80px; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); text-align: center;}
        
        #startBtn { padding: 15px 40px; font-size: 20px; background: white; color: #4facfe; border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; }
        button { padding: 15px 40px; font-size: 20px; background: white; color: #4facfe; border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; }
        button:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        #scoreBoard { position: absolute; top: 20px; right: 20px; font-size: 24px; color: white; background: rgba(0, 0, 0, 0.3); 
            padding: 10px 20px; border-radius: 8px; pointer-events: none; user-select: none; display: none; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="top-left-controls">
            <span class="welcome-text">Pee on the Hole</span>
            <button class="nav-btn" onclick="location.reload()">🔄 Restart</button>
        </div>
        <div id="menu"><h1>PEE 🖕N THE H🕳️LE</h1><button id="startBtn">Start the Game ▶️</button></div>
        <div id="scoreBoard">Score: 0</div><canvas id="gameCanvas"></canvas>
    </div>
<script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreBoard');
        const menu = document.getElementById('menu');
        const startBtn = document.getElementById('startBtn');
        let score = 0;
        let lastScoreUpdate = 0;
        let isPressing = false;
        let gameActive = false;
        const rectWidth = 40;
        const rectHeight = 160; 
        let lineLength = 0;
        const lineSpeed = 5; 
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        startBtn.addEventListener('click', () => {
            menu.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                scoreElement.style.display = 'block';
                gameActive = true;
            }, 500);
        });
        const startPress = () => { if(gameActive) isPressing = true; };
        const endPress = () => { if(gameActive) isPressing = false; };
        window.addEventListener('mousedown', startPress);
        window.addEventListener('mouseup', endPress);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); startPress(); }, {passive: false});
        window.addEventListener('touchend', endPress);
        function update() {
            if (!gameActive) {
                requestAnimationFrame(update);
                return;
            }
            const rx = canvas.width / 2 - rectWidth / 2;
            const ry = canvas.height - rectHeight - 20;
            const hx = canvas.width / 2;
            const hy = canvas.height * 0.3;
            const holeRadius = 25;
            const topLimit = canvas.height * 0.1;
            if (isPressing) {
                if (ry - lineLength > topLimit) {
                    lineLength += lineSpeed;
                }
            } else {
                if (lineLength > 0) lineLength -= lineSpeed;
                if (lineLength < 0) lineLength = 0;
            }
            const tipX = canvas.width / 2;
            const tipY = ry - lineLength;
            const dist = Math.sqrt(Math.pow(tipX - hx, 2) + Math.pow(tipY - hy, 2));
            if (dist <= holeRadius) {
                const now = Date.now();
                if (now - lastScoreUpdate >= 1000) {
                    score++;
                    scoreElement.innerText = `Score: ${score}`;
                    lastScoreUpdate = now;
                }
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(hx, hy, holeRadius + 35, 0, Math.PI * 2);
            ctx.fill();
            const baseWidth = 80;
            const baseHeight = 120;
            ctx.beginPath();
            ctx.roundRect(hx - (baseWidth / 2), hy + 35, baseWidth, baseHeight, 10);
            ctx.fill();
            const sideRectWidth = 50;
            const sideRectHeight = 80;
            const offset = 15;
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.roundRect(hx - (baseWidth / 2) - sideRectWidth - offset, hy + 60, sideRectWidth, sideRectHeight, 5);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(hx + (baseWidth / 2) + offset, hy + 60, sideRectWidth, sideRectHeight, 5);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(hx, hy, holeRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'black';
            ctx.fill();
            if (lineLength > 0) {
                ctx.beginPath();
                ctx.moveTo(hx, ry);
                ctx.lineTo(tipX, tipY);
                ctx.strokeStyle = 'rgba(255, 252, 196, 0.7)';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
            ctx.fillStyle = '#5d2e0d'; 
            const radiusX = 28;
            const radiusY = 35;
            const yPos = ry + rectHeight - 15;

            ctx.beginPath();
            ctx.ellipse(rx + (rectWidth / 2) - 20, yPos, radiusX, radiusY, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.ellipse(rx + (rectWidth / 2) + 20, yPos, radiusX, radiusY, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#8b4513';
            ctx.beginPath();
            ctx.roundRect(rx, ry, rectWidth, rectHeight, 10); 
            ctx.fill();

            ctx.fillStyle = '#ff52dc';
            ctx.beginPath();
            const side = rectWidth;
            const height = side * (Math.sqrt(3)/2);
            const centerX = hx;
            const topY = ry - 30;
            ctx.moveTo(centerX, topY);
            ctx.lineTo(centerX - side/2, topY + height);
            ctx.lineTo(centerX + side/2, topY + height);
            ctx.closePath();
            ctx.lineJoin = "round";
            ctx.lineWidth = 12;
            ctx.strokeStyle = '#ff52dc';
            ctx.stroke();
            ctx.fill();
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
